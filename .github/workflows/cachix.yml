name: "Cachix"

on:
  # Run only when pushing to main branch, and making PRs
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/cachix-action@v17
        with:
          name: gasdev
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: nix build --no-link --print-out-paths | cachix push gasdev
